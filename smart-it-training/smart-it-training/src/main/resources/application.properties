# =============================================
# APPLICATION NAME
# =============================================
spring.application.name=smart-it-training

# =============================================
# SERVER CONFIGURATION
# =============================================
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always
server.jsp-servlet.init-parameters.development=true
server.jsp-servlet.init-parameters.checkInterval=0

# =============================================
# DATABASE CONFIGURATION
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_it_training?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / HIBERNATE CONFIGURATION
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# Hibernate Batch Processing
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Second Level Cache (Optional)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# =============================================
# JSP VIEW RESOLVER
# =============================================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
spring.mvc.view.check-template-location=true

# =============================================
# STATIC RESOURCES
# =============================================
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:src/main/webapp/
spring.mvc.static-path-pattern=/**
spring.web.resources.cache.period=0
spring.web.resources.chain.cached=false

# =============================================
# THYMELEAF (DISABLED - Using JSP only)
# =============================================
spring.thymeleaf.enabled=false
spring.thymeleaf.check-template-location=false

# =============================================
# MULTIPART FILE UPLOAD
# =============================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=/tmp

# =============================================
# MAIL CONFIGURATION (Gmail)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=false

# Alternate Mail Configuration (If Gmail doesn't work)
# spring.mail.host=smtp.office365.com
# spring.mail.port=587
# Mail Configuration - Use Gmail App Password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_16_DIGIT_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# =============================================
# SESSION CONFIGURATION
# =============================================
server.servlet.session.timeout=30m
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# =============================================
# LOGGING CONFIGURATION
# =============================================
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.smartit.training=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/smart-it-training.log
logging.file.max-size=10MB
logging.file.max-history=7

# =============================================
# SPRING SECURITY (DISABLED FOR DEVELOPMENT)
# =============================================
spring.security.enabled=false
security.basic.enabled=false
management.security.enabled=false

# =============================================
# DEVELOPMENT MODE (DevTools)
# =============================================
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.exclude=static/**,public/**
spring.devtools.livereload.enabled=true
spring.devtools.livereload.port=35729

# =============================================
# INTERNATIONALIZATION (i18n)
# =============================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600

# =============================================
# CUSTOM APP SETTINGS
# =============================================

# Admin Default Credentials (For first-time setup)
app.admin.default.userid=admin
app.admin.default.password=admin123
app.admin.default.email=admin@smartit.com
app.admin.default.name=Super Admin

# Email Templates Path
app.email.templates.path=/templates/email/
app.email.from=support@smartittraining.com
app.email.contact=support@smartittraining.com

# Attendance Settings
app.attendance.marking.start-time=09:00
app.attendance.marking.end-time=18:00
app.attendance.auto-mark-absent=18:00
app.attendance.weekend-ignore=true

# Placement Application Settings
app.placement.apply-limit=5
app.placement.apply-per-student=3

# Exam Settings
app.exam.default-duration=60
app.exam.passing-percentage=40
app.exam.negative-marking=false

# Pagination Settings
app.pagination.default-page-size=10
app.pagination.max-page-size=100

# File Upload Paths
app.upload.path=uploads/
app.upload.brochure-path=uploads/brochures/
app.upload.receipt-path=uploads/receipts/
app.upload.profile-image-path=uploads/profiles/

# Cache Settings
app.cache.enabled=false
app.cache.ttl=3600

# OTP Settings
app.otp.length=6
app.otp.expiry-minutes=10
app.otp.resend-wait-seconds=30

# Dashboard Settings
app.dashboard.refresh-interval=30000
app.dashboard.show-recent-activities=true
app.dashboard.show-charts=true

