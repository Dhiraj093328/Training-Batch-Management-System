spring.application.name=smart-it-training

# ===== SERVER CONFIGURATION =====
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# ===== DATABASE CONFIGURATION =====
spring.datasource.url=jdbc:mysql://localhost:3306/smart_it_training?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ===== JPA / HIBERNATE CONFIGURATION =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ===== JSP VIEW RESOLVER =====
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ===== STATIC RESOURCES =====
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:src/main/webapp/
spring.mvc.static-path-pattern=/**

# ===== THYMELEAF (DISABLED - Using JSP) =====
spring.thymeleaf.enabled=false

# ===== MULTIPART FILE UPLOAD =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ===== MAIL CONFIGURATION =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== SESSION CONFIGURATION =====
server.servlet.session.timeout=30m
server.servlet.session.tracking-modes=cookie

# ===== LOGGING =====
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.com.smartit.training=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===== SPRING SECURITY (DISABLED) =====
spring.security.enabled=false

# ===== DEVELOPMENT MODE =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===== CUSTOM APP SETTINGS =====
app.admin.default.userid=admin
app.admin.default.password=admin123
app.email.templates.path=/templates/email/
app.attendance.marking.start-time=09:00
app.attendance.marking.end-time=18:00
app.placement.apply-limit=5